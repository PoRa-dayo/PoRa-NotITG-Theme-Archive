Autogen Options=Adjusts whether StepMania will auto-fill non-present difficulty levels.  Generally not a good idea, as it doesn't usually do very well.
Background Options=Adjust the visibility of background pictures/videos.
Bookkeeping=View coin drop counts and other coin statistics.
Clear Bookkeeping Data=Clear all coin count data.
Clear Machine Stats=Reset the high score tables and all play statistics.::THIS IS THE BIG ONE.::DO NOT DO THIS UNLESS YOU ARE VERY, VERY SURE.
Clear Machine Edits=Clear all edits copied to the machine's internal memory.
