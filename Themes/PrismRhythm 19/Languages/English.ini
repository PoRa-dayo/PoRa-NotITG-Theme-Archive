[OptionExplanations]

#ScreenOptionsMenu
Insert Credit=Select this option to insert one full credit for free right now.  An occasional act of charity can go a long way, and makes dancers happy.  Credits inserted this way won't show up in coin-drop stats, nor will sets played in other modes that don't ask dancers to pay (Free Play or Event Mode).
Arcade Options=This menu has all the common options used to configure credit options, timers, life difficulty, and attract sound frequency.
OpenITG Options=Change long version/marathon cutoffs, custom song settings,::and other OpenITG-based extras.
Reset Menu=Reset options, bookkeeping data, statistics, or edits.
Center Image=Display a test image to check the color and brightness of the monitor.  You can also center the display here.
System Diagnostics=Show diagnostic information.
Machine Update=Install game software updates.
SongsPerPlay=How many songs the player gets to play for one credit.
CoinsPerCredit=How many coins equals one credit.
CoinMode=Select whether to require paid credits to play.  Home and Free Play require nothing; Pay requires payment.  Home is the only mode that displays the main menu.
CoinModeNoHome=Select whether to require credits to play.  Event Mode forces Free Play.
EasterEggs=Enable or disable hidden goodies, such as Toasties.
Theme=Pick a visual theme from those you have installed.
Announcer=ITG themes such as this one cannot do Announcers properly due to different scoring tiers, and they've become mostly old-fashioned.  Still, this is here in case you actually have any Announcers installed.
DefaultNoteSkin=Choose the default noteskin from this list of noteskins you have installed.
Lyrics=Choose whether to display song lyrics.
DelayedTextureDelete=If this is On, the program will hold textures in memory for use as needed instead of freeing them, cutting down load times.  Requires 128 MB of memory.
CelShadeModels=Choose whether models will receive nice cel-shading.
RefreshRate=How many times per second the screen refreshes.  This setting *only* works in Full Screen mode.
Vsync=Whether to wait for the monitor's vertical retrace before moving on to the next frame.  This setting *only* works in Full Screen mode.  Turning this off to see if it helps anything may or may not work out, depending on the system.
ShowDanger=If this is On as usual, players will get a critical HP warning when they're potentially about to fail.  Just turn it Off to disable it.
DancingCharacters=ITG themes don't generally use these, but the option's here in case you have some installed.  Even if you turn it On, though, it won't do anything unless you've got some installed.
DisplayColor=Choose the color depth level you'd like to use.  Please note that this might not take in Windowed mode, and works better in Full Screen.
Windowed=Choose whether the game is Full Screen, or in a Window.  This is important for some options - there are a few that are meant for one or the other, and won't work right/at all in the other mode.
TextureColor=Choose the color depth textures use.  32-bit uses more memory, but looks nicer.
MovieColor=Choose the color depth movies use.  32-bit uses more memory, but looks nicer.
Premium=Doubles for 1 Credit enables Doubles for a single credit.  Joint Premium does so as well, but also enables 2 Players for a single credit.
SongsPerPlay=The number of songs a player can play for one credit in Dance and Battle modes.
EventMode=If you turn this on, play continues indefinitely, ignoring all credit parameters.  Enabling Event Mode forces Free Play.
MenuTimer=Turn this off to disable time limits in menus.
LifeDifficulty=Difficulty of the life gauge.  Harder settings make you lose life faster, and regain it slower.  (The general default is 4, but other settings can be used to allow players to pass songs more easily, or be harder on them.)
JudgeDifficulty=Difficulty of the timing window.  Higher settings make it more difficult to earn good judgments.  (The default is 4, and changing it is not recommended.)
ProgressiveLifebar=Whether or not the lifebar difficulty gets harder on each consecutive stage.  Lifebar Difficulty + this = difficulty of the final stage's life gauge.
AttractSoundFrequency=How often the demo loop will play sound.  Set this to "Always" to play sound during every loop.  Set it to "X Times" to play sound every Xth loop.
DefaultFailType="Immediate" fails players the moment they've all run out of life.  "End of Song" lets players finish their current song before breaking the bad news.  A 30-miss combo will always immediately fail players under the assumption that they've stopped trying.  Turning this Off disables the ability to fail altogether.
DefaultFailTypeNoOff="Immediate" fails players the moment they've all run out of life.  "End of Song" lets players finish their current song, then fails them.  A 30-miss combo will always immediately fail players under the assumption they've stopped playing.
ShowSongOptions=Pick the availability of the Song Options screen.  "Hide" means it can *never* be accessed.  If set to "Show," it will *always* show it.  If set to "Ask," players can opt to hit Enter again after the main Mod Menu to get to it.
MarvelousTiming=This is an ITG theme, so we *always* use what ITG standard calls "Fantastic" (PrismRhythm, "Awesome") timing.  If you turn this Off on an ITG theme, you will not be able to 100% anything.
Judgment Font=Which graphics you want to use to display your judgments.
BackButton=If you picked the wrong song or need to dabble in the major switches, you can use these options to immediately navigate to the appropriate place.
BackButton2=You can go back to other screens if you think you need to.
SONavi=You can go back to other screens if you think you need to.
BackButtonOnModMenu=If you picked the wrong song or need to dabble in the major switches, you can use these options to immediately navigate to the appropriate place.
BackButtonOnSongMenu=If you picked the wrong song or need to dabble in the major switches, you can use these options to immediately navigate to the appropriate place.

#ScreenOptionsMenu on ps2
Game Options=Set gameplay options.
Save To Memory Card=Save the game to the memory card.
Load From Memory Card=Load the game from the memory card.
Credits=Display production credits.
Legal Info=Display license information.
Restore Defaults=Restore game options to the default settings.

#ScreenOpenITGMenu
Attract Mode Volume=Set the volume to be used when the machine runs its attraction loops.::This setting is separate from the main volume.
Credit Type=Set which type of credit this machine uses.
Song Wheel Timer=Set how much time to allow players to browse the song select screen.::Only applies if timers are on in the first place.
Give Up Delay=Set how long the player must hold the Start button if they wish::to give up during a song.
Allow Extra Player Options=If this is On, the machine will check the player's card(s)::for additional mods and other settings that only display while they play.
Custom Songs=Turning this On allows players to play custom songs from their USB card.::Custom songs will obey any time limit rules set in the operator menu.
Custom Courses=Turning this On allows players to play custom marathon/survival courses::from their USB card.
Custom Song Limit=The maximum number of songs that will be loaded from each::player's USB card.  (Applies separately to each player.)
Maximum Audio Size=The max filesize of the .ogg (music) file of a custom song.::Anything over this limit gets rejected when the player attempts to play it.::Set this to "Unlimited" to allow songs of any size..
Maximum Step Size=The max filesize of the .sm (stepchart) file of a custom song.::Anything over this limit gets rejected when the player attempts to play it.::Set this to "Unlimited" to allow stepchart files of any size.
Maximum Length=The max length (in time) the machine allows for custom songs.::Anything over this limit gets rejected when the player attempts to play it.::Set this to "Unlimited" to allow songs of all lengths.
Long Version Cutoff=Set the Long Version cutoff.::Songs longer than this setting will take 2 rounds to play.::Set this to "Unlimited" to allow players to play songs of any length for a single round each.
Marathon Cutoff=Set the Marathon cutoff.::Songs longer than this setting take 3 rounds to play.::Set this to "Unlimited" to allow only the Long Version setting to dictate a cutoff.

