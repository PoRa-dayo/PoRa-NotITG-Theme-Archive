Vocalize=Choose who you want to vocalize your score on the evaluation screen.  If you don't want your score vocalized, set this to "None."
Mini=Change the size of the arrow stream.  Smaller sizes can make faster streams easier to read by being able to see more of the stream.

LifeType=Select which kind of life gauge is used.
BarDrain=How the life gauge behaves.
