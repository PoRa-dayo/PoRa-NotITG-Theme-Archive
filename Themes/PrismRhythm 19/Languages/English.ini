Transfer Stats From Machine=Copy high scores from the machine’s internal memory to a USB card.  Insert a USB card before choosing this option.
Transfer Stats To Machine=Copy high scores from a USB card to the machine’s internal memory.  Insert a USB card that has machine score data on it before choosing this option.
Copy Edits From Machine=Copy the edits stored in the machine’s internal memory to a USB card.  Insert a USB card before choosing this option.
Copy Edits To Machine=Copy the edits from a USB card to the machine's internal memory.  Insert a USB card with some edit files on it before choosing this option.
Set Machine Time=Set the time on the cabinet's clock.  The time and date is saved with high score data, so it is important that the clock be set correctly.

