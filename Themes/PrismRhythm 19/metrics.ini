// Write Commands			      |
// -------------------------------------------'
OverOnCommand=
UnderOnCommand=


# This comes after options screens.  Set up modes, if any, and go to the stage screen.
# This must be done in this order; if you load a ScreenBranch from ScreenStage, the
# "minimum load delay" behavior won't work.
[ScreenBranchStage]
Fallback=Screen
Class=ScreenBranch
Fallback=ScreenBranch
Choices=1,2,3,4,5,6,7
# If either player selected easy steps, then first stage is FailOff, others
# are FailEndOfSong.
# If neither player selected easy steps, then first stage is FailEndOfSong,
# others are FailImmediate.
Condition1=not GAMESTATE:IsCourseMode() and GAMESTATE:GetCurrentSong() == SONGMAN:FindSong("In The Groove/Training1/")
Condition2=GAMESTATE:GetEnv("Workout") == "1"
Condition3=PlayModeName()=="Rave"
Condition4=GAMESTATE:IsCourseMode()
Condition5=true
NextScreen1=mod,clearall;applydefaultoptions;screen,ScreenStage
NextScreen2=mod,FailOff;screen,ScreenStageWorkout
NextScreen3=mod,no boost,no brake,no wave,no expand,no boomerang,no drunk,no dizzy,no mini,no flip,no tornado,no tipsy,no hidden,no sudden,no blink,no stealth,no mirror,no left,no right,no shuffle,no supershuffle,no big,no quick,no skippy,no echo,no stomp,no wide,no planted,no floored,no twister,no mines,no nomines,no noholds,no little,no nojumps,no norolls,no nohands,no dark,no blind,no cover,no nostretch;screen,ScreenStage
NextScreen4=mod,FailImmediate;screen,ScreenStage
NextScreen5=screen,ScreenStage

[ScreenStage]
// --------------------------------------------------------------------------------,
// {Transition Screen}								   |
// --------------------------------------------------------------------------------'
// The screen right before you actually play a song that tells you the name of the song
// and shows you its banner and background.  Most of this is set in BGAnimations ->
// _song credit display.xml, so there isn't much of anything in *here* at all.
// -------------------------------------------.
// Main Settings			      |
// -------------------------------------------'
NextScreen=@GetGameplayScreen()
PrevScreen=@SongSelectionScreen()
MinimumDelay=0
ShowBanner=0
AllowBack=0

[ScreenStageWorkout]
Fallback=ScreenStage
NextScreen=ScreenGameplayWorkout

[ScreenGameplay]
// --------------------------------------------------------------------------------,
// {Gameplay Screen}								   |
