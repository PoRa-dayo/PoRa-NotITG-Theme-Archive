[MenuTimer]
// --------------------------------------------------------------------------------,
// {Menu Timer Settings}							   |
// --------------------------------------------------------------------------------'
// This section tells the theme how the menu timer should behave; amount of time is not set here.
// If you want to change how much time a given timer has, you must set it in the proper screen's section,
// using the "TimerSeconds" parameter for that screen.
// -------------------------------------------.
// Warning Flash Starts At                    |
// -------------------------------------------'
WarningStart=15
// -------------------------------------------.
// Warning Sound Starts At                    |
// -------------------------------------------'
WarningBeepStart=10
// -------------------------------------------.
// Stall       		 		      |
// -------------------------------------------'
MaxStallSeconds=0
// -------------------------------------------.
// Menu Timer, Main Integers                  |
// -------------------------------------------'
Text1OnCommand=stoptweening;ShadowLength,4;x,28;y,-14;horizalign,right
Text1FormatFunction=function(fSeconds) fSeconds=math.floor(fSeconds); return string.format("%02.0f",fSeconds) end
// -------------------------------------------.
// Menu Timer, Tenths                         |
// -------------------------------------------'
Text2OnCommand=stoptweening;ShadowLength,4;zoom,0.6;x,21;y,-6;horizalign,left
Text2FormatFunction=function(fSeconds) local remainder=fSeconds-math.floor(fSeconds); local digit=math.floor(remainder*10); return "."..digit end
// -------------------------------------------.
// Final Countdown Behavior                   |
// -------------------------------------------'
WarningCommand15=%function(self,parent) parent:stoptweening(); parent:zoom(1.4); parent:linear(0.2); parent:zoom(1); self:glowshift(); self:effectperiod(1); end
WarningCommand14=%function(self,parent) parent:stoptweening(); parent:zoom(1.4); parent:linear(0.2); parent:zoom(1); end
WarningCommand13=%function(self,parent) parent:stoptweening(); parent:zoom(1.4); parent:linear(0.2); parent:zoom(1); end
WarningCommand12=%function(self,parent) parent:stoptweening(); parent:zoom(1.4); parent:linear(0.2); parent:zoom(1); end
