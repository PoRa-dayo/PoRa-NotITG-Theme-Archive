[SongManager]
// --------------------------------------------------------------------------------,
// {Song Manager}								   |
// --------------------------------------------------------------------------------'
// -------------------------------------------.
// Description & Notes                        |
// -------------------------------------------'
// Used by the system to colorize names of songs and/or courses as set here.
// It does this by checking how many colors you say you want to use, then it
// assigns them to group folders *alphabetically*, starting with color 1, then
// when it exhausts the list, it starts over at 1 again.  In this theme, we
// color Marathons yellow and Survivals blue, so that all the course name
// entries on those select screens are the same indicative color to tell
// players that they aren't in Dance mode.  I ask in my course ReadMe that
// you come in here and make sure the course color designations are right,
// since everyone has different numbers of courses and/or may organize
// them differently.  If you don't do so, your colors will be wrong!
// -------------------------------------------.
// Song Name Colors (By Pack)                 |
// -------------------------------------------'
// (Note we only ever use white; players can have a bazillion packs, and
// asking them to colorize all of them would be beyond ludicrous.)
NumSongGroupColors=1
SongGroupColor1=#FFFFFF
// -------------------------------------------.
// Course Name Colors (By Pack)               |
// -------------------------------------------'
NumCourseGroupColors=4
CourseGroupColor1=#FFFF55	// AOH Marathons (Yellow)
CourseGroupColor2=#BBBBFF	// AOH Survivals (Blue)
CourseGroupColor3=#FFFF55	// ITG Marathons (Yellow)
CourseGroupColor4=#BBBBFF	// ITG Survivals (Blue)
