// Unlock Codes	                              |
// -------------------------------------------'
// When you put in a code, it unlocks the item, plays the associated sound if one exists,
// then forces that song to be highlighted when the player goes to play, so they don't
// have to look for it (that time only; never happens again).
// The "CodeNames" parameter tells the theme which codes "exist" (in case of extras we
// don't want to use at the moment), then we have designations for CodeX - which tells
// it what the code is - and CodeXAction, which tells it what the code actually *does*.
// Naturally, anything listed here only starts off locked if the unlock system is on
// in the first place (see "Unlock System Main Switch").
// Note: Even for my own (Ace Of Hearts) pack, I don't use unlocks; I don't see a
// point to it.  So...these unlock codes, they...don't exactly mean anything at all.  :p
