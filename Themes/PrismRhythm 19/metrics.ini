// .-------------------------------------------------------------------------------------------------------------,
// |                                                Main Metrics						 |
// |				            In The Groove 2: PrismRhythm				         |
// |				                   (Standard Mode)                                               |
// |					            Ace Of Arrows                                                |
// `-------------------------------------------------------------------------------------------------------------'
//
// --------------------------------------------------------------------------------,
// Introduction									   |
// --------------------------------------------------------------------------------'
// It looks complicated, but it's actually rather easy to navigate the Metrics once you know how it's organized.
// Anything [between brackets] is the title of a category; those beginning with "Screen" tell the theme that the
// items in that category are parameters for use on that particular screen.
//
// Once you know the name of a category, it becomes easy to just hit Ctrl-F to search and navigate to it quickly.
// Lines that begin with two slashes are notes for Metrics tweakers to read.
//
// Anyway, I only added the fancy ASCII art to things that are of particular interest to either myself (since I
// like to have eye-catching titles that are easy to read and understand) or others who might need to look in
// here for some reason or other.  Anything that isn't of special interest or that almost never needs looked
// at, I've left without special title bars.  :p
//
// --------------------------------------------------------------------------------,
// This Version of the Theme							   |
// --------------------------------------------------------------------------------'
// This is the Standard Mode [S] version of the theme; it uses PrismRhythm timing and scoring,
// but leaves the judgment levels as they originally were (no Magnificents).
//
// ---------------------------------------------------------------------------------------------------------------
//						 Start of Metrics File
// ---------------------------------------------------------------------------------------------------------------
//
[Global]
// --------------------------------------------------------------------------------,
// {Global Elements}								   |
// --------------------------------------------------------------------------------'
// -------------------------------------------.
// Fallback Theme                             |
// -------------------------------------------'
// Important to have just in case something goes wrong and something's somehow missing
// from the theme; it tells SM which other theme to reference to get what's missing.
// This should *always* be the Default theme, since it always exists, and should
// never be changed except *maybe* to the official ITG2 Arcade theme, if you have it.
FallbackTheme=default

[Common]
// --------------------------------------------------------------------------------,
// {Common Elements}								   |
// --------------------------------------------------------------------------------'
// -------------------------------------------.
// Player Colors                              |
// -------------------------------------------'
ColorP1=@PlayerColor(PLAYER_1)
ColorP2=@PlayerColor(PLAYER_2)
// -------------------------------------------.
// First Screen                               |
// -------------------------------------------'
// First Screen is now InitializeScripts to initialize Stitch.lua. The FirstAttractScreen is now the visible screen that the player sees first when booting up the game, which is also what the GetStartScreen function uses.
FirstAttractScreen=ScreenCompany
InitialScreen=InitializeScripts
// -------------------------------------------.
// Window Title [Standard]                    |
// -------------------------------------------'
WindowTitle=StepMania 3.95 CVS (Theme: PrismRhythm 19)
// -------------------------------------------.
// Default Mods                               |
// -------------------------------------------'
DefaultModifiers=1.5x,Overhead,AcePro
DefaultModifiersExtra=1.5x,Reverse,Dark
DefaultCpuModifiers=2x,Overhead,AcePro
// -------------------------------------------.
// Demonstrations Show Difficulties           |
// -------------------------------------------'
DifficultiesToShow=Beginner,Easy,Medium,Hard,Challenge
CourseDifficultiesToShow=Regular,Difficult
StepsTypesToHide=Dance-Couple,Dance-Solo,Lights-Cabinet
// -------------------------------------------.
// Default Resolution                         |
// -------------------------------------------'
ScreenWidth=640
ScreenHeight=480
// -------------------------------------------.
// Overlay Screens                            |
// -------------------------------------------'
// Added OverlayScreen which is the screen we will use for stuff like FailOverlay and the in-game console.
OverlayScreens=ScreenSystemLayer,ScreenSyncOverlay,ScreenDebugOverlay,OverlayScreen

[InitializeScripts]
Class=ScreenStage
NextScreen=@GetStartScreen()
InitCommand=%stx("lua.event").OverlayReady
MinimumDelay=0

[OverlayScreen]
Class=ScreenTestInput
InputsOnCommand=luaeffect,Update;zoom,0.7;horizalign,left;diffusealpha,0;
InputsUpdateCommand=%function(a) stx("lua.keyboard").KeyHandler(a) end
TimerOnCommand=hidden,1
DevicesOnCommand=hidden,1

[GameState]
// --------------------------------------------------------------------------------,
// {Game State Settings}							   |
// --------------------------------------------------------------------------------'
// -------------------------------------------.
// Name Blacklist                             |
// -------------------------------------------'
UseNameBlacklist=0
// -------------------------------------------.
// Default Sort                               |
// -------------------------------------------'
DefaultSort=Group
// -------------------------------------------.
// Default Song                               |
// -------------------------------------------'
DefaultSong=Songs/Ace Of Arrows Vol. 06 - Blunt Honesty/Pure My Voices

[Gameplay]
// --------------------------------------------------------------------------------,
// {Combo Maintenance Settings}							   |
// --------------------------------------------------------------------------------'
// Tells the theme what the player needs to get to keep their combo, and how it counts
// jumps/hands (PerRow), "false" being every individual arrow counts, and "true" being
// that the whole thing counts as +1 for the combo.  The Min/Max Score stuff is actually
// bugged and won't work to change anyway - but you shouldn't change it anyhow.
ComboIsPerRow=false
MinScoreToContinueCombo=TNS_GREAT
MinScoreToMaintainCombo=TNS_GREAT


[Preferences]
// --------------------------------------------------------------------------------,
// {Theme Preferences}   							   |
// --------------------------------------------------------------------------------'
// The original values for these parameters are in the StepMania.ini file (in the "Data" folder),
// but anything you set here overrides those defaults when you use this theme.  0=Off, 1=On.
// If you know what you're doing, you can also add new parameters from that file to this set.
// -------------------------------------------.
// ITG Defaults		                      |
// -------------------------------------------'
PercentageScoring=1
ComboContinuesBetweenSongs=1
TwoPlayerRecovery=0
ShowSongOptions=0
MusicWheelUsesSections=1
ArcadeOptionsNavigation=1
HideDefaultNoteSkin=0
HiddenSongs=1
SignProfileData=1
BlinkGameplayButtonLightsOnNote=1
DelayedCreditsReconcile=1
DelayedBack=1
SubSortByNumSteps=1
CourseSortOrder=1
Minimum1FullSongInCourses=1
FailOffInBeginner=1
FailOffForFirstStageEasy=1
TwoPlayerRecovery=0
PreferredSortUsesGroups=0
DelayedTextureDelete=0
BackgroundMode=2
LockCourseDifficulties=0
TickEarlySeconds=0.00
// --------------------------------------------------------------------------------,
// {Main Switches & Settings}							   |
// --------------------------------------------------------------------------------'
// -------------------------------------------.
// Unlock System Main Switch                  |
// -------------------------------------------'
UseUnlockSystem=0
// -------------------------------------------.
// Disqualification Main Switch               |
// -------------------------------------------'
Disqualification=1
// -------------------------------------------.
// Long/Marathon Cutoffs                      |
// -------------------------------------------'
// ------------------.
// Notes             |
// ------------------'
// Long Version and Marathon cutoffs; Long Versions cost 2 rounds, Marathons cost 3.
// Cutoffs are set in seconds; conversions below.
// 90 = 1 1/2 minutes; 120 = 2 minutes; 150 = 2 1/2 minutes; 180 = 3 minutes; 210 = 3 1/2 minutes; 240 = 4 minutes;
// 270 = 4 1/2 minutes; 300 = 5 minutes; 330 = 5 1/2 minutes; 360 = 6 minutes; 390 = 6 1/2 minutes; 420 = 7 minutes;
// 450 = 7 1/2 minutes; 480 = 8 minutes; 510 = 8 1/2 minutes; 540 = 9 minutes; 570 = 9 1/2 minutes; 600 = 10 minutes.
// 630 = 10 1/2 minutes; 660 = 11 minutes; 690 = 11 1/2 minutes; 720 = 12 minutes; 750 = 12 1/2 minutes;
// 780 = 13 minutes; 810 = 13 1/2 minutes; 840 = 14 minutes; 870 = 14 1/2 minutes; 900 = 15 minutes.
// It'd only really be prudent to be strict on an arcade cabinet (OpenITG has an Operator Menu option to set these),
// but if you're running this theme for StepMania on your PC, you can set these however you want.
// ------------------.
// Long Version      |
// ------------------'
LongVerSongSeconds=210
// ------------------.
// Marathon          |
// ------------------'
MarathonVerSongSeconds=420
// -------------------------------------------.
// Default Volume	                      |
// -------------------------------------------'
// Default should be less than 100% to prevent clipping (and possibly blowing out speakers XD).
SoundVolume=0.7
// -------------------------------------------.
// Default Background Brightness              |
// -------------------------------------------'
// Experts tend to complain when they can't see the arrows for the background, so this theme finds a happy
// medium where you can still see the background, but it's dimmed out just enough that it doesn't create problems.
// This can always be turned up per-session in the menu, but if you want the default permanently changed, you'll
// have to change this item.
BGBrightness=0.350000
// -------------------------------------------.
// Max High Scores Settings                   |
// -------------------------------------------'
MaxHighScoresPerListForMachine=10
MaxHighScoresPerListForPlayer=10
AllowMultipleHighScoreWithSameName=1
// -------------------------------------------.
// Marvelous Timing Setting                   |
// -------------------------------------------'
// AKA Fantastic Timing setting.
// 0 = Never | 1 = Only During Courses | 2 = Always
// This is an ITG-type theme, so we always use "Fantastic" timing (2).
// NEVER SET THIS TO ANYTHING ELSE.  If you do, you won't be able to 100% anything!!
MarvelousTiming=2
// -------------------------------------------.
// Where to Look on Cards for Profiles        |
// -------------------------------------------'
MemoryCardProfileSubdir=In The Groove 2
MemoryCardProfileImportSubdirs=In The Groove
// -------------------------------------------.
// Lights Difficulty Settings                 |
// -------------------------------------------'
// Marquee lights are the first setting, bass is the second.  We have more marquee lights (4), so we can ask
// a higher difficulty from them (Hard).  We ask the bass lights (there're 2) to use the Medium steps.
LightsStepsDifficulty=hard,medium
// -------------------------------------------.
// AutoGen Settings                           |
// -------------------------------------------'
// I, Ace, *hate* AutoGen with a blazing passion, and so do any other players who ever tried it.  It sucks, badly.
// So we don't use it.  Anywhere, anytime, ever, don't pass Go, don't collect $200.
AutogenGroupCourses=0
AutogenSteps=0
// -------------------------------------------.
// Product ID		                      |
// -------------------------------------------'
// ProductID=1 is ITG1 kits that shipped when there was a hold note score bug where dropped holds still increased health.
// ProductID=2 is ITG1 after fixes.
// ProductID=3 is ITG2 with the "MercifulBeginner always in effect" scoring bug.
// ProductID=4 is ITG2 after fixes.
ProductID=4

// --------------------------------------------------------------------------------,
// {Timing Settings}								   |
// --------------------------------------------------------------------------------'
// Ace to Self: DIFFERENT PER THEME VERSION, DO NOT COPY TO OTHER THEME VERSIONS.
// These settings are ENTIRELY INDIVIDUAL per each of the four types (AC counts as
// NM ITG).
// -------------------------------------------.
// Notes       		                      |
// -------------------------------------------'
// IMPORTANT NOTE: PrismRhythm now uses its own slightly more lenient timing for the Awesome and
// Sweet windows, but a stricter Great window.  Also, mine-hit detection is tighter and thus more
// lenient - and also matches the Sweet window.
// -------------------------------------------.
// Stick Prevention Setting                   |
// -------------------------------------------'
// Prevents input from sticking on unintentionally.  The game has its own ways of detecting this,
// and it's actually pretty good.  Don't change this.
PadStickSeconds=0.05
// -------------------------------------------.
// Main Judgment Windows [Standard]           |
// -------------------------------------------'
JudgeWindowScale=1.000000	// don't allow overriding of timing
JudgeWindowSecondsMarvelous=0.020000
JudgeWindowSecondsPerfect=0.040000
JudgeWindowSecondsGreat=0.080000
JudgeWindowSecondsGood=0.120000
JudgeWindowSecondsBoo=0.160000
JudgeWindowSecondsMine=0.040000
JudgeWindowSecondsOK=0.320000
JudgeWindowSecondsAttack=0.135000

// -------------------------------------------.
// Grade Weights [NM PR]                      |
// -------------------------------------------'
// Grade weights are how the theme determines which grade graphic to display;
// if these parameters are not equal to the Percent Score weights, your score will be correct,
// but you'll get the wrong *grade* for your score.
GradeWeightMarvelous=5
GradeWeightPerfect=4
GradeWeightGreat=2
GradeWeightGood=-2
GradeWeightBoo=-4
GradeWeightMiss=-5
GradeWeightOK=5
GradeWeightNG=-5
GradeWeightHitMine=-5
// -------------------------------------------.
// Score Weights [NM PR]                      |
// -------------------------------------------'
// Percent Score weights tell the theme how to determine your displayed percentage score.
PercentScoreWeightMarvelous=5
PercentScoreWeightPerfect=4
PercentScoreWeightGreat=2
PercentScoreWeightGood=-2
PercentScoreWeightBoo=-4
PercentScoreWeightMiss=-5
PercentScoreWeightOK=5
PercentScoreWeightNG=-5
PercentScoreWeightHitMine=-5
// -------------------------------------------.
// Life Weights [NM PR]	                      |
// -------------------------------------------'
// Life weights tell the theme how much lifebar health to give (or take away) depending on your timing judgments.
LifeDeltaPercentChangeMarvelous=0.010
LifeDeltaPercentChangePerfect=0.008
LifeDeltaPercentChangeGreat=0.005
LifeDeltaPercentChangeGood=-0.010
LifeDeltaPercentChangeBoo=-0.020
LifeDeltaPercentChangeMiss=-0.050
LifeDeltaPercentChangeOK=0.010
LifeDeltaPercentChangeNG=-0.050
LifeDeltaPercentChangeHitMine=-0.050
// -------------------------------------------.
// Battle Weights [All]	                      |
// -------------------------------------------'
// The tug meter is the Battle ("Rave") Mode life gauge that determines who is currently winning.
TugMeterPercentChangeHitMine=-0.080
TugMeterPercentChangeMiss=-0.080
TugMeterPercentChangeBoo=-0.040
TugMeterPercentChangeGood=0.0
TugMeterPercentChangeGreat=0.004
TugMeterPercentChangePerfect=0.008
TugMeterPercentChangeMarvelous=0.010
TugMeterPercentChangeNG=-0.080
TugMeterPercentChangeOK=0.008
// -------------------------------------------.
// Time Weights [NM PR]	                      |
// -------------------------------------------'
// TimeMeter parameters determine how much time you earn/lose in Survival Mode depending on your timing judgments.
// It's worth noting that in PrismRhythm timing, the only nice thing we do in Survivals is grant you half-credit
// for Sweets (0.1 sec), but we do this in exchange for heavier misstep penalties (Nices, -1 instead of -0.5;
// Shakies, -2 instead of -1; Awfuls, -3 instead of -2) and Mine Hit penalties are also increased ( -3 instead
// of -2).  +0.2 sec for Awesomes is the same as the maximum possible time earn in ITG (0.2 sec for Fantastics),
// so in keeping in convention with "max PR score is max ITG score," that maximum should never be changed.
// Note: Consider yourself lucky if you're reading this; if this were the Belltina version, the penalty for
// Nices would also be increased (to a full second), since in Belltina Mode, Nices would break your combo.
// However, since this is a more newbie-friendly environment, we keep the original 1/2-second penalty.
// Note: Please note that despite this being a PrismRhythm theme, we *still* don't give any time credit to
// hold/roll completion.  Doing so would mean we're handing out time-credit for a type of event that previously
// never got *any* credit, which would mean higher maximum possible time earnings, which I don't want, since
// then PR max score would be greater than ITG max score.  Thus, tail completions remain No Change.
// Note: This is NM PR, so we don't use Belltina's harsher Nice (Great) penalty, and in fact, instead, we
// hand out 1/10 of a second for getting Sweets in case you're not quite as skilled as you should be; the
// thought here is to give you a fighting chance at clearing Survivals.  However, Belltina Mode, as well as
// all ITG standard versions of this theme, still use (No Change) for Sweets.  This is the only version of
// the theme that hands out any time for them.
TimeMeterSecondsChangeMarvelous=0.2	// Awesome	Earn 2/10 sec
TimeMeterSecondsChangePerfect=0.1	// Sweet	Earn 1/10 sec
TimeMeterSecondsChangeGreat=-1		// Nice		Lose 1 sec
TimeMeterSecondsChangeGood=-2		// Shaky	Lose 2 sec
TimeMeterSecondsChangeBoo=-3		// Awful	Lose 3 sec
TimeMeterSecondsChangeMiss=-4		// Miss		Lose 4 sec
TimeMeterSecondsChangeHitMine=-3	// Hit Mine	Lose 3 sec
TimeMeterSecondsChangeOK=0		// Cool		(No Change)
TimeMeterSecondsChangeNG=-4		// Drop		Lose 4 sec
// -------------------------------------------.
// Merciful Judge	                      |
// -------------------------------------------'
// Settings for whether judgment will be made easier on the life gauge, or on Novice.  We don't use Merciful Drain,
// but we do use Merciful Beginner.
MercifulDrain=0
MercifulBeginner=1

