[PaneDisplay]
// --------------------------------------------------------------------------------,
// {Pane Display}								   |
// --------------------------------------------------------------------------------'
// The Pane Display is the little window on the Music Select Screen that displays the song's step statistics (such as
// how many taps, holds, rolls) and highest records.  This pane is very important to many skilled players.
// The Label is where it just says "Steps," "Holds," and so on; the non-label text is the actual number.
// For step stats, Levels indicate how tough that aspect of the chart is.
// Level 1 is the 0 (white) color designation, and where the level ends (at 1).
// Level 2 is the Novice (purple) color designation, and where the level ends (Mines/Hands don't have purple levels).
// Level 3 is the Easy (green) color designation, and where the level ends.
// Level 4 is the Medium (yellow) color designation, and where the level ends.
// Level 5 is the Hard (red) color designation, and where the level ends.
// Level 6 is the Expert (blue) color designation, and where the level ends.
// Level 7 is the Slow Glow color designations, and where it ends.
// Level 8 is the Flashing Blue/Green color designations, and where the level ends.
// Level 9 is the Flashing Blue/Purple level designation and where the level "ends" (we say 99999 for "always").
// For score levels, it changes color according to the color of the grade on the Evaluation screen.
// Ace to Self: These can NOT be copied verbatim; score displays are now colored by grade, so make sure you
// change what's necessary to re-color grades!  (Otherwise it's fine.)
// -------------------------------------------.
// P1/P2 Info Shifts			      |
